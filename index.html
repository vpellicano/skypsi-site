<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&nbsp;</title>
  <meta name="robots" content="noindex" />
  <meta name="description" content="" />
  <style>
    :root { --ink: #ededed; --dim: #6a6a6a; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background:
        radial-gradient(1200px 700px at 50% 28%, #161616 0%, #0b0b0b 55%, #070707 100%);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100svh; padding: 8vmin; text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: 34rem; opacity: 0; transform: translateY(8px); animation: rise 1.6s ease forwards; }
    .mark {
      width: 34px; height: 34px; margin: 0 auto 2.4rem;
      border: 1px solid #2a2a2a; border-radius: 50%;
      display: grid; place-items: center;
    }
    .mark span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--ink);
      animation: pulse 3.4s ease-in-out infinite;
    }
    h1 {
      font-weight: 400; font-size: clamp(1.25rem, 4.5vw, 1.9rem);
      letter-spacing: 0.01em; line-height: 1.35; margin: 0;
    }
    p { margin: 1.4rem 0 0; color: var(--dim); font-size: 0.95rem; letter-spacing: 0.16em; text-transform: uppercase; }
    footer { position: fixed; bottom: 5vmin; left: 0; right: 0; color: #3a3a3a; font-size: 0.72rem; letter-spacing: 0.22em; }
    @keyframes rise { to { opacity: 1; transform: none; } }
    @keyframes pulse { 0%, 100% { opacity: 0.25; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1); } }
    @media (prefers-reduced-motion: reduce) { main, .mark span { animation: none; opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true"><span></span></div>
    <h1>Something is being built.</h1>
    <p>More soon</p>
  </main>
  <footer>MMXXVI</footer>
</body>
</html>
