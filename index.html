<!doctype html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkyPSI</title>

  <style>
    :root {
      --bg: #0A0A0A;
      --ink: #FFFFFF;
      --accent: #F3461C;
      --muted: #2B3437;
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100svh; padding: 8vmin;
      -webkit-font-smoothing: antialiased;
    }
    main {
      width: min(20rem, 80vw);
      text-align: center;
      opacity: 0; transform: translateY(8px);
      animation: rise 1.2s ease forwards;
    }
    .wordmark { width: 100%; height: auto; display: block; margin: 0 auto 3.2rem; user-select: none; -webkit-user-drag: none; }
    form { margin: 0; }
    .field {
      position: relative;
      border-bottom: 1px solid var(--muted);
      transition: border-color 0.25s ease;
    }
    .field:focus-within { border-color: var(--accent); }
    input[type="password"] {
      width: 100%;
      background: transparent; border: 0; outline: 0;
      color: var(--ink); caret-color: var(--accent);
      font-family: var(--mono); font-size: 1.05rem;
      letter-spacing: 0.35em; text-align: center;
      padding: 0.7rem 0.2rem;
    }
    input::placeholder { color: #3a3a3a; letter-spacing: 0.35em; }
    .err { animation: shake 0.4s ease; }
    .err .field { border-color: var(--accent); }
    #unsupported { display: none; color: #6a6a6a; font-size: 0.8rem; margin-top: 2rem; }
    @keyframes rise { to { opacity: 1; transform: none; } }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px); } 40% { transform: translateX(7px); }
      60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
    }
    @media (prefers-reduced-motion: reduce) { main { animation: none; opacity: 1; transform: none; } .err { animation: none; } }
  </style>
</head>

    <form id="f" autocomplete="off">

    <p id="unsupported">This page needs a modern browser over HTTPS.</p>

        for (var i = 0; i < a.length; i++) s += String.fromCharCode(a[i]);
        return btoa(s);
