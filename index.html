<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkyPSI</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="" />
  <style>
    :root {
      --bg: #0A0A0A;
      --ink: #FFFFFF;
      --accent: #F3461C;
      --muted: #2B3437;
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100svh; padding: 8vmin;
      -webkit-font-smoothing: antialiased;
    }
    main {
      width: min(20rem, 80vw);
      text-align: center;
      opacity: 0; transform: translateY(8px);
      animation: rise 1.2s ease forwards;
    }
    .wordmark { width: 100%; height: auto; display: block; margin: 0 auto 1.4rem; user-select: none; -webkit-user-drag: none; }
    .tagline {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 3rem;
      user-select: none;
    }
    form { margin: 0; }
    .field {
      position: relative;
      border-bottom: 1px solid var(--muted);
      transition: border-color 0.25s ease;
    }
    .field:focus-within { border-color: var(--accent); }
    input[type="password"] {
      width: 100%;
      background: transparent; border: 0; outline: 0;
      color: var(--ink); caret-color: var(--accent);
      font-family: var(--mono); font-size: 1.05rem;
      letter-spacing: 0.35em; text-align: center;
      padding: 0.7rem 0.2rem;
    }
    input::placeholder { color: #3a3a3a; letter-spacing: 0.35em; }
    .err { animation: shake 0.4s ease; }
    .err .field { border-color: var(--accent); }
    #unsupported { display: none; color: #6a6a6a; font-size: 0.8rem; margin-top: 2rem; }
    @keyframes rise { to { opacity: 1; transform: none; } }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px); } 40% { transform: translateX(7px); }
      60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
    }
    @media (prefers-reduced-motion: reduce) { main { animation: none; opacity: 1; transform: none; } .err { animation: none; } }
  </style>
</head>

      var ITER = 310000;
      var LS_KEY = "skypsi_gate_k";

      function b64d(s) {
        var bin = atob(s), a = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
        return a;
      }
      function b64e(buf) {
        var a = new Uint8Array(buf), s = "";
        for (var i = 0; i < a.length; i++) s += String.fromCharCode(a[i]);
        return btoa(s);
      }
      if (!(window.crypto && crypto.subtle)) {
        document.getElementById("unsupported").style.display = "block";
        return;
      }
      function reveal(html) {
        document.open(); document.write(html); document.close();
      }
      function decryptWith(key) {
        return crypto.subtle.decrypt({ name: "AES-GCM", iv: b64d(IV) }, key, b64d(CT))
          .then(function (pt) { return new TextDecoder().decode(pt); });
      }
      function deriveKey(pw) {
        return crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"])
          .then(function (km) {
            return crypto.subtle.deriveKey(
              { name: "PBKDF2", salt: b64d(SALT), iterations: ITER, hash: "SHA-256" },
              km, { name: "AES-GCM", length: 256 }, true, ["decrypt"]);
          });
      }
      // Returning visitor: try the remembered key silently.
      try {
        var saved = localStorage.getItem(LS_KEY);
        if (saved) {
          crypto.subtle.importKey("raw", b64d(saved), { name: "AES-GCM" }, false, ["decrypt"])
            .then(decryptWith).then(reveal)
            .catch(function () { try { localStorage.removeItem(LS_KEY); } catch (e) {} });
        }
      } catch (e) {}

      document.getElementById("f").addEventListener("submit", function (ev) {
        ev.preventDefault();
        var input = document.getElementById("pw");
        var pw = input.value;
        if (!pw) return;
        deriveKey(pw).then(function (key) {
          return decryptWith(key).then(function (html) {
            crypto.subtle.exportKey("raw", key).then(function (raw) {
              try { localStorage.setItem(LS_KEY, b64e(raw)); } catch (e) {}
              reveal(html);
            });
          });
        }).catch(function () {
          input.value = "";
          var m = document.getElementById("m");
          m.classList.remove("err"); void m.offsetWidth; m.classList.add("err");
